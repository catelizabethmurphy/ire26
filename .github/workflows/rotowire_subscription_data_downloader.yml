name: Rotowire Subscription Data Downloader

on:
  schedule:
    # Run every 2 hours — 6 AM to 4 AM EST 
    - cron: '0 11,13,15,17,19,21,23,1,3,5,7,9 * * *'  
  workflow_dispatch:  # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Install Python dependencies
      run: |
        pip install -r config/requirements.txt
        
    - name: Create .env file
      run: |
        echo "ROTOWIRE_USERNAME=${{ secrets.ROTOWIRE_USERNAME }}" >> .env
        echo "ROTOWIRE_PASSWORD=${{ secrets.ROTOWIRE_PASSWORD }}" >> .env
        
    - name: Verify credentials are set
      run: |
        if [ -z "${{ secrets.ROTOWIRE_USERNAME }}" ]; then
          echo "ERROR: ROTOWIRE_USERNAME secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.ROTOWIRE_PASSWORD }}" ]; then
          echo "ERROR: ROTOWIRE_PASSWORD secret is not set"
          exit 1
        fi
        echo "Credentials verified"
        
    - name: Run RotoWire subscription data downloader
      run: |
        echo "================================"
        echo "Starting RotoWire subscription data downloader..."
        echo "================================"
        python -u scrapers/rotowire_subscription_data_downloader.py
        echo "================================"
        echo "Scraper completed"
        echo "================================"
        
    - name: Upload debug files if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: login-debug
        path: data/rotowire_subscription/*.html
        if-no-files-found: ignore
        
    - name: Commit and push data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/rotowire_subscription/
        
        # Check if there are changes to commit
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Update RotoWire subscription data - $(date +'%Y-%m-%d %H:%M:%S')"
          
          # Pull with rebase to handle concurrent workflow runs
          git pull --rebase origin main || {
            echo "Rebase failed, trying regular pull..."
            git rebase --abort 2>/dev/null || true
            git pull origin main || {
              echo "Pull failed, trying to force push..."
              git push --force-with-lease
              exit $?
            }
          }
          
          # Push changes
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
