name: DraftKings Props Scraper

on:
  schedule:
    # Multiple runs throughout the day as props update
    - cron: '0 12 * * *'  # 7 AM ET
    - cron: '0 14 * * *'  # 9 AM ET
    - cron: '0 16 * * *'  # 11 AM ET
    - cron: '0 17 * * *'  # 12 PM ET
    - cron: '0 18 * * *'  # 1 PM ET
    - cron: '0 19 * * *'  # 2 PM ET
    - cron: '0 20 * * *'  # 3 PM ET
    - cron: '0 21 * * *' # 4 PM ET
    - cron: '0 22 * * *'  # 5 PM ET
    - cron: '0 23 * * *'  # 6 PM ET
    - cron: '0 0 * * *'   # 7 PM ET (next day UTC)
    - cron: '0 1 * * *'   # 8 PM ET (next day UTC)
    - cron: '0 2 * * *'   # 9 PM ET (next day UTC)
  workflow_dispatch:  # Allow manual triggering

jobs:
  scrape-draftkings:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Install dependencies
      run: |
        pip install -r config/requirements.txt
        
    - name: Create logs directory
      run: mkdir -p logs
        
    - name: Run DraftKings props scraper
      run: |
        python scrapers/draftkings_scraper.py
        
    - name: Commit and push data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/draftkings_props/
        
        # Check if there are changes to commit
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Update DraftKings props data - $(date +'%Y-%m-%d %H:%M:%S')"
          
          # Pull with rebase to handle concurrent workflow runs
          git pull --rebase origin main || {
            echo "Rebase failed, trying regular pull..."
            git rebase --abort 2>/dev/null || true
            git pull origin main || {
              echo "Pull failed, trying to force push..."
              git push --force-with-lease
              exit $?
            }
          }
          
          # Push changes
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
