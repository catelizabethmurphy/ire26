name: ESPN Schedule Scraper

on:
  schedule:
    # Run daily at 2 AM ET (7:00 UTC) - scrapes today's games
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  scrape-espn:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install -r config/requirements.txt
        
    - name: Create logs directory
      run: mkdir -p logs
        
    - name: Run ESPN schedule scraper
      run: |
        python scrapers/espn_schedule_scraper.py
        
    - name: Commit and push data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/espn_schedules/
        
        # Check if there are changes to commit
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Update ESPN schedule data - $(date +'%Y-%m-%d %H:%M:%S')"
          
          # Pull with rebase to handle concurrent workflow runs
          git pull --rebase origin main || {
            echo "Rebase failed, trying regular pull..."
            git rebase --abort 2>/dev/null || true
            git pull origin main || {
              echo "Pull failed, trying to force push..."
              git push --force-with-lease
              exit $?
            }
          }
          
          # Push changes
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
